version: "3.9"

services:
  backend:
    build: ./backend
    container_name: codeguard-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/codeguard.db
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - codeguard

  frontend:
    build: ./frontend
    container_name: codeguard-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - codeguard

volumes:
  db_data:

networks:
  codeguard:
    driver: bridge
