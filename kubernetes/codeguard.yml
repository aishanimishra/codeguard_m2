# ── Namespace ────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: codeguard

---
# ── ConfigMap ────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: codeguard-config
  namespace: codeguard
data:
  FRONTEND_URL: "http://localhost"
  DATABASE_URL: "sqlite+aiosqlite:////app/data/codeguard.db"

---
# ── Secret ───────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: codeguard-secrets
  namespace: codeguard
type: Opaque
stringData:
  GITHUB_CLIENT_ID: "your_client_id"
  GITHUB_CLIENT_SECRET: "your_client_secret"
  GITHUB_WEBHOOK_SECRET: "your_webhook_secret"
  SECRET_KEY: "your_jwt_secret"

---
# ── PersistentVolumeClaim for SQLite ─────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codeguard-data-pvc
  namespace: codeguard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ── Backend Deployment ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeguard-backend
  namespace: codeguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codeguard-backend
  template:
    metadata:
      labels:
        app: codeguard-backend
    spec:
      containers:
        - name: backend
          image: codeguard-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: codeguard-config
            - secretRef:
                name: codeguard-secrets
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: codeguard-data-pvc

---
# ── Backend Service ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: codeguard-backend-svc
  namespace: codeguard
spec:
  selector:
    app: codeguard-backend
  ports:
    - port: 8000
      targetPort: 8000

---
# ── Frontend Deployment ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeguard-frontend
  namespace: codeguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codeguard-frontend
  template:
    metadata:
      labels:
        app: codeguard-frontend
    spec:
      containers:
        - name: frontend
          image: codeguard-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# ── Frontend Service (LoadBalancer) ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: codeguard-frontend-svc
  namespace: codeguard
spec:
  type: LoadBalancer
  selector:
    app: codeguard-frontend
  ports:
    - port: 80
      targetPort: 80
